name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  fixtures:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check harness
        run: |
          python3 -m pip install mypy==1.18.2
          python3 -m py_compile harness/*.py harness/tests/*.py
          python3 -m unittest discover -s harness/tests
          python3 -m mypy --strict --explicit-package-bases \
            harness/collect_github.py harness/tests/test_collect_github.py
      - name: Check generated fixtures
        run: |
          python3 harness/update_goldens.py
          git diff --check
          git diff --exit-code -- fixtures/expected

  candidates:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        candidate:
          - d
          - go
          - nim
          - ocaml
          - python
          - rust
          - rust-cargo-script
          - scala
          - typed-racket
          - typescript-bun
          - typescript-deno
    steps:
      - uses: actions/checkout@v4
      - name: Build candidate image
        run: >-
          docker build
          --tag shell-scripting-shootout-${{ matrix.candidate }}:ci
          --file implementations/${{ matrix.candidate }}/Containerfile
          .
      - name: Run tests and conformance
        run: docker run --rm shell-scripting-shootout-${{ matrix.candidate }}:ci
